<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>테스트 웹 페이지</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #f0f2f5;
        }
        .card {
            background: white;
            padding: 2rem;
            border-radius: 15px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            text-align: center;
        }
        h1 { color: #2d3436; }
        p { color: #636e72; }
        .btn {
            display: inline-block;
            margin-top: 1rem;
            padding: 10px 20px;
            background-color: #0984e3;
            color: white;
            text-decoration: none;
            border-radius: 5px;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>👋 반가워요!</h1>
        <p>이 페이지는 깃허브 테스트용으로 만들어졌습니다.</p>
        <p>파일이 성공적으로 올라갔네요!</p>
        <a href="#" class="btn" onclick="alert('작동 확인!')">버튼 클릭 테스트</a>
    </div>
</body>
</html>
